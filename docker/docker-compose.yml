version: "3.9"

services:
  app:
    build:
      context: ../server
      dockerfile: ../docker/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - mongo
    volumes:
      - ../client:/app/client

  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
